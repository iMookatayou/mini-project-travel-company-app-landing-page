<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=z, initial-scale=1.0" />
    <title>Mini Project Travel Company App Landing Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body>
    <!-- Beam -->
    <section>Section 1</section>

    <!-- Job -->
    <section>Section 2</section>

    <!-- Anthony -->
     <!-- ============================
       TOUR PACKAGES SECTION
      ============================ -->
    <section class="py-12 px-4 sm:px-6 max-w-6xl mx-auto">
 
    <!-- Section Heading -->
    <header class="text-center mb-14">
      <h2 class="text-2xl sm:text-4xl font-extrabold text-neutral-900 leading-tight">
        Our Upcoming<br>Tour Package
      </h2>
    </header>
 
    <!-- Cards Grid -->
    <ul class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 list-none">
 
      <!-- Card 1 — Eiffel Tower -->
      <li>
        <article class="group cursor-pointer">
          <!-- Image -->
          <div class="relative rounded-2xl overflow-hidden bg-gray-300 aspect-[4/5]">
            <img 
              src="https://images.unsplash.com/photo-1511739001486-6bfe10ce785f?q=80&w=774&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
              alt="Eiffel Tower, Paris"
              class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105"
            />
            <!-- Price badge -->
            <span class="absolute top-4 right-4 text-white font-bold text-lg drop-shadow-md">
              $599
            </span>
          </div>
          <!-- Card Info -->
          <footer class="mt-3 flex items-start justify-between">
            <div>
              <div class="flex items-center gap-1 mb-0.5">
                <img src="public/icon/Location.svg" alt="Location Marker Icon" class="w-4 h-4 ">
                <h3 class="font-bold text-neutral-900 text-base">Eiffel Tower</h3>
              </div>
              <p class="text-sm text-gray-400 ml-5">5d - 4n</p>
            </div>
            <!-- Stars -->
            <div class="flex items-center gap-0.5 mt-1" aria-label="5 star rating">
              <img src="public/icon/Star.svg" alt="Star Icon" class="w-4 h-4 ">
              <img src="public/icon/Star.svg" alt="Star Icon" class="w-4 h-4 ">
              <img src="public/icon/Star.svg" alt="Star Icon" class="w-4 h-4 ">
              <img src="public/icon/Star.svg" alt="Star Icon" class="w-4 h-4 ">
              <img src="public/icon/Star.svg" alt="Star Icon" class="w-4 h-4 ">
            </div>
          </footer>
        </article>
      </li>
 
      <!-- Card 2 — Big Bear Lake (featured / taller) -->
      <li class="hidden sm:block sm:col-span-1 lg:-mt-6">
        <article class="group cursor-pointer">
          <div class="relative rounded-2xl overflow-hidden bg-gray-300 aspect-[4/5]">
            <img
              src="https://images.unsplash.com/photo-1638772479386-e1dcf67bd720?q=80&w=928&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
              alt="Big Bear Lake"
              class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105"
            />
            <span class="absolute top-4 right-4 text-white font-bold text-lg drop-shadow-md">
              $480
            </span>
          </div>
          <footer class="mt-3 flex items-start justify-between">
            <div>
              <div class="flex items-center gap-1 mb-0.5">
                <img src="public/icon/Location.svg" alt="Location Marker Icon" class="w-4 h-4 ">
                <h3 class="font-bold text-neutral-900 text-base">Big Bear Lake</h3>
              </div>
              <p class="text-sm text-gray-400 ml-5">5d - 4n</p>
            </div>
            <div class="flex items-center gap-0.5 mt-1" aria-label="5 star rating">
              <img src="public/icon/Star.svg" alt="Star Icon" class="w-4 h-4 ">
              <img src="public/icon/Star.svg" alt="Star Icon" class="w-4 h-4 ">
              <img src="public/icon/Star.svg" alt="Star Icon" class="w-4 h-4 ">
              <img src="public/icon/Star.svg" alt="Star Icon" class="w-4 h-4 ">
              <img src="public/icon/Star.svg" alt="Star Icon" class="w-4 h-4 ">
            </div>
          </footer>
        </article>
      </li>
 
      <!-- Card 3 — Colorado Springs -->
      <li class="hidden sm:block">
        <article class="group cursor-pointer">
          <div class="relative rounded-2xl overflow-hidden bg-gray-300 aspect-[4/5]">
            <img
              src="https://images.unsplash.com/photo-1581552936330-f8eb487334e6?q=80&w=1740&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
              alt="Colorado Springs"
              class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105"
            />
            <span class="absolute top-4 right-4 text-white font-bold text-lg drop-shadow-md">
              $550
            </span>
          </div>
          <footer class="mt-3 flex items-start justify-between">
            <div>
              <div class="flex items-center gap-1 mb-0.5">
                <img src="public/icon/Location.svg" alt="Location Marker Icon" class="w-4 h-4 ">
                <h3 class="font-bold text-neutral-900 text-base">Colorado Springs</h3>
              </div>
              <p class="text-sm text-gray-400 ml-5">5d - 4n</p>
            </div>
            <div class="flex items-center gap-0.5 mt-1" aria-label="5 star rating">
              <img src="public/icon/Star.svg" alt="Star Icon" class="w-4 h-4 ">
              <img src="public/icon/Star.svg" alt="Star Icon" class="w-4 h-4 ">
              <img src="public/icon/Star.svg" alt="Star Icon" class="w-4 h-4 ">
              <img src="public/icon/Star.svg" alt="Star Icon" class="w-4 h-4 ">
              <img src="public/icon/Star.svg" alt="Star Icon" class="w-4 h-4 ">
            </div>
          </footer>
        </article>
      </li>

    </ul>
 
    <!-- View All Button -->
      <div class="flex justify-center mt-14">
        <a
          href="#"
          class="inline-flex items-center gap-2 bg-[#FE6642] text-white font-semibold px-8 py-3 rounded-2xl hover:opacity-90 active:scale-95 transition-all duration-200"
        >
        View All
          <img src="public/icon/Vector.svg" alt="Arrow" class="w-4 h-4">
        </a>
      </div>
    </section>
  

    <!-- Best(Thana) -->
    <section>Section 4</section>

    <!-- Best(Thana) -->
    <section>Section 5</section>

    <!-- Beam -->
    <section>Section 6</section>

    <!-- Anthony -->
     <!-- ============================
       CONTACT SECTION
      ============================ -->
    <section>
<!-- Section Heading -->
      <section
    class="relative min-h-[420px] flex flex-col justify-between px-8 sm:px-16 py-14 overflow-hidden bg-cover bg-center bg-no-repeat gap:5"
    style="background-image: url('public/image/Forest-Background.png');"
    aria-labelledby="subscribe-heading"
  >
    <!-- Light overlay to wash out the image like the design -->
    <div class="absolute inset-0 bg-white/70"></div>
 
    <!-- Content -->
    <div class="relative z-10">
 
      <!-- Heading -->
      <header class="mb-10">
        <h2 id="subscribe-heading" class="text-3xl sm:text-4xl font-extrabold text-neutral-900 leading-snug">
          Subscribe<br>
          for every Tour<br>
          News &amp; Tips
        </h2>
      </header>
 
      <!-- Subscribe Form -->
      <form
  class="flex justify-between items-center bg-white rounded-2xl shadow-md w-full max-w-md p-1.5"
  onsubmit="return false"
>
  <label for="email-input" class="sr-only">Enter your email</label>
  <input
    id="email-input"
    type="email"
    placeholder="Enter Your Email"
    class="flex-1 px-4 py-2.5 text-sm text-gray-500 placeholder-gray-400 outline-none bg-transparent"
  />

  <button
  type="submit"
  class="inline-flex items-center gap-1.5 bg-[#FE6642] text-white text-xs sm:text-sm font-semibold px-3.5 sm:px-5 py-2 sm:py-2.5 rounded-xl hover:opacity-90 transition-opacity duration-200 whitespace-nowrap flex-shrink-0"
  >
  Subscribe
  <img src="public/icon/Vector.svg" alt="Arrow" class="w-3 h-3 sm:w-4 sm:h-4">
  </button>
</form>
 
    </div>
 
      <!-- ============================
       FOOTER
        ============================ -->
  <footer class="relative border-t border-gray-100 pt-8 mt-10">
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-left gap-6">
 
      <!-- Brand -->
      <div>
        <p class="text-xl font-extrabold text-neutral-900">
          Tripp<span class="text-[#FE6642]">.</span>
        </p>
        <small class="text-xs text-gray-400 mt-1 block">
          Copyright &copy; Tripp. All right reserved
        </small>
      </div>
 
      <!-- Social Icons -->
      <nav aria-label="Social media links">
        <ul class="flex items-center gap-5 list-none">
 
          <!-- Google -->
          <li>
            <a href="#" aria-label="Google" class="text-gray-400 hover:text-[#FE6642] transition-colors duration-200">
              <img src="public/icon/Google-icon.svg" alt="Google Icon" class="w-4 h-4 ">
            </a>
          </li>
 
          <!-- Twitter / X -->
          <li>
            <a href="#" aria-label="Twitter" class="text-gray-400 hover:text-[#FE6642] transition-colors duration-200">
                <img src="public/icon/Twitter-icon.svg" alt="Twitter Icon" class="w-4 h-4 ">
            </a>
          </li>
 
          <!-- Instagram -->
          <li>
            <a href="#" aria-label="Instagram" class="text-gray-400 hover:text-[#FE6642] transition-colors duration-200">
              <img src="public/icon/Instagram-icon.svg" alt="Instagram Icon" class="w-4 h-4 ">
            </a>
          </li>
 
          <!-- LinkedIn -->
          <li>
            <a href="#" aria-label="LinkedIn" class="text-gray-400 hover:text-[#FE6642] transition-colors duration-200">
              <img src="public/icon/LinkedIn-icon.svg" alt="LinkedIn Icon" class="w-4 h-4 ">
            </a>
          </li>
 
        </ul>
      </nav>
 
    </div>
  </footer>

  </section>

  </body>
</html>
